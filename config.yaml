# 持倉追蹤起始日期
start_date: "2025-01-01"

# Email 設定
email:
  sender: "chenyin.yo@gmail.com"    # 或設環境變數 GMAIL_SENDER
  app_password: ""                   # 環境變數 GMAIL_APP_PASSWORD
  recipients:
    - "shelly7526@gmail.com"         # 或設環境變數 GMAIL_RECIPIENTS（逗號分隔）
  subject_prefix: "[外資追蹤]"

# 掃描 TWSE 成交量前 N 大股票（FinMind stock-first 模式）
scan_top_n: 200

# 每檔請求延遲（秒）
request_delay_seconds: 2.0   # FinMind 免費層建議 ≥ 2 秒

# 單日買賣超張數門檻（低於此值不顯示）
alert_threshold_lots: 100
